name: Calo
options:
  bundleIdPrefix: com.minilabs
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.4"
  generateEmptyDirectories: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    DEVELOPMENT_TEAM: 696L6BMH35
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: true

configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig

targets:
  Calo:
    type: application
    platform: iOS
    sources:
      - path: Calo
    settings:
      base:
        INFOPLIST_FILE: Calo/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.minilabs.calo
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_EMIT_LOC_STRINGS: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: Calo
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.healthcare-fitness"
    info:
      path: Calo/Info.plist
      properties:
        CFBundleDisplayName: Calo
        NSCameraUsageDescription: "Calo needs camera access to photograph your food for calorie analysis."
        ITSAppUsesNonExemptEncryption: false
        GEMINI_API_KEY: "$(GEMINI_API_KEY)"
        USDA_API_KEY: "$(USDA_API_KEY)"
